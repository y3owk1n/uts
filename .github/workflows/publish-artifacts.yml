            - name: Build uts linux amd64 artifact
              run: just release-ci-linux amd64 ${{ inputs.version_override }}

            - name: Generate man pages
              run: go run ./cmd/genman build/man

            - name: Bundle uts-linux-amd64
              run: |
                  mkdir -p build/linux-amd64/bin
                  cp bin/uts-linux-amd64 build/linux-amd64/bin/uts
                  chmod +x build/linux-amd64/bin/uts
                  mkdir -p build/linux-amd64/share/man/man1
                  cp build/man/*.1 build/linux-amd64/share/man/man1/

                  cd build/linux-amd64
                  zip -r ../../uts-linux-amd64.zip bin share
