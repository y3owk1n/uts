                  just-version: "1.54.0"

            - name: Build uts darwin amd64 artifact
              run: just release-ci-darwin amd64 ${{ inputs.version_override }}

            - name: Generate man pages
              run: go run ./cmd/genman build/man

            - name: Bundle uts-darwin-amd64
              run: |
                  mkdir -p build/amd64/share/man/man1
                  cp build/man/*.1 build/amd64/share/man/man1/
                  mkdir -p build/amd64/bin
                  cp bin/uts-darwin-amd64 build/amd64/bin/uts
                  chmod +x build/amd64/bin/uts

                  cd build/amd64
                  zip -r ../../uts-darwin-amd64.zip bin share
                  cd ../..

            - name: Generate darwin amd64 checksum
              run: |
                  shasum -a 256 uts-darwin-amd64.zip | awk '{print $1}' > uts-darwin-amd64.zip.sha256
                  ls -l uts-darwin-amd64.zip uts-darwin-amd64.zip.sha256

            - name: Upload darwin amd64 release artifacts
              env:
