on:
    pull_request:
        branches: ["*"]
        # Release-please PRs only bump versions in CHANGELOG/manifest files.
        # The underlying code was already validated when the feature PRs merged
        # to main, so running the full CI matrix again is pure waste.
        paths-ignore:
            - "CHANGELOG.md"
            - ".release-please-manifest.json"
            - "release-please-config.json"
name: CI
permissions:
    contents: read
    pull-requests: read
jobs:
    checks:
        name: ${{ matrix.check }} (${{ matrix.os }})
        strategy:
            matrix:
                os: [macos-latest, ubuntu-latest]
                check: [lint, vet, test, build]
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v7
              with:
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  ref: ${{ github.head_ref }}

            # Install Devbox
            - name: Install Devbox
              uses: jetify-com/devbox-install-action@v0.15.0
              with:
                  enable-cache: true

            # Run checks with Devbox
            - name: Run just lint
              if: matrix.check == 'lint'
              run: devbox run -- just lint

            - name: Run just vet
              if: matrix.check == 'vet'
              run: devbox run -- just vet

            - name: Run just build
              if: matrix.check == 'build'
              run: devbox run -- just build

            - name: Run just test-all
              if: matrix.check == 'test'
              run: devbox run -- just test-all
